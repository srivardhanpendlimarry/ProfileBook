<div style="max-width:600px; margin:50px auto; font-family:Arial">
  <h2>Messages</h2>
  <div style="border:1px solid #ccc; padding:15px; margin:10px 0; border-radius:8px">
    <h4>John Doe</h4>
    <p>Hey! How are you?</p>
  </div>
  <div style="border:1px solid #ccc; padding:15px; margin:10px 0; border-radius:8px">
    <h4>Jane Smith</h4>
    <p>Welcome to ProfileBook messaging!</p>
  </div>
  <div style="margin-top:20px">
    <input type="text" placeholder="Type a message..." style="width:80%; padding:10px;"/>
    <button style="padding:10px; background:blue; color:white; border:none; cursor:pointer">Send</button>
  </div>
</div>
