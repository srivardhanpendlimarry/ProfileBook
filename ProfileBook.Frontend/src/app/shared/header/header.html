<nav style="background:#2c3e50; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
  <div style="color:white; font-size:22px; font-weight:bold;">
    📘 ProfileBook
  </div>
  <div style="display:flex; gap:15px; align-items:center; flex-wrap:wrap;">
    <ng-container *ngIf="isLoggedIn()">
      <span style="color:#bdc3c7;">👤 {{ getUsername() }}</span>
      <a href="/feed" style="color:white; text-decoration:none;">Feed</a>
      <a href="/search" style="color:white; text-decoration:none;">🔍 Search</a>
      <a href="/messages" style="color:white; text-decoration:none;">Messages</a>
      <a href="/admin" style="color:white; text-decoration:none;">Admin</a>
      <button
        (click)="logout()"
        style="color:white; background:#e74c3c; padding:5px 15px; border-radius:5px; border:none; cursor:pointer;">
        Logout
      </button>
    </ng-container>
    <ng-container *ngIf="!isLoggedIn()">
      <a href="/login" style="color:white; text-decoration:none;">Login</a>
      <a href="/register" style="color:white; text-decoration:none; background:#27ae60; padding:5px 15px; border-radius:5px;">Register</a>
    </ng-container>
  </div>
</nav>
